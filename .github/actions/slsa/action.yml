# ==============================================================================
# SLSA - Supply-chain Levels for Software Artifacts Action
# ==============================================================================
#
# Copyright (c) Ministry of Justice UK
# SPDX-License-Identifier: MIT
#
# ==============================================================================
# DESCRIPTION
# ==============================================================================
# Composite GitHub Action that implements Supply-chain Levels for Software
# Artifacts (SLSA) security framework using Safe-Chain by AikidoSec. This
# action sets up the Safe-Chain tool in GitHub Actions workflows to protect
# against supply chain attacks by validating package integrity, detecting
# malicious dependencies, and enforcing security policies for software
# dependencies. Ensures packages meet minimum age requirements before
# installation to prevent typosquatting and compromised package attacks.
#
# The action performs the following steps:
# 1. Checks out the repository
# 2. Sets up Node.js environment
# 3. Configures Safe-Chain environment variables
# 4. Installs Safe-Chain binary via safechain.sh script
#
# ==============================================================================
# FEATURES
# ==============================================================================
# - Package age verification (minimum 72 hours by default)
# - Typosquatting detection and prevention
# - Malicious package identification
# - Known vulnerability detection in dependencies
# - Suspicious package behaviour analysis
# - Supply chain attack mitigation
# - Automated policy enforcement
# - Continuous monitoring integration
#
# ==============================================================================
# SECURITY PROTECTIONS
# ==============================================================================
# Protection against:
# - Newly published malicious packages
# - Typosquatting attacks (similar package names)
# - Dependency confusion attacks
# - Compromised maintainer accounts
# - Backdoored packages
# - Known vulnerable dependencies
# - Suspicious package modifications
#
# ==============================================================================
# USAGE
# ==============================================================================
# Basic usage (default settings):
#   - uses: ministryofjustice/devsecops-actions/sca/slsa@8c77d3a65a46d1d4b5416eafae5b84371ecd797d # v1.5.0
#
# With Node.js version from file:
#   - uses: ministryofjustice/devsecops-actions/sca/slsa@8c77d3a65a46d1d4b5416eafae5b84371ecd797d # v1.5.0
#     with:
#       node-version-file: ".node-version"
#
# Advanced usage with package exclusions:
#   - uses: ministryofjustice/devsecops-actions/sca/slsa@8c77d3a65a46d1d4b5416eafae5b84371ecd797d # v1.5.0
#     with:
#       node-version: "24.11.1"
#       security-patch-package-exclusion: "@octokit/*,@actions/*"
#
# Note: This action is typically called as part of the main SCA workflow
# and runs automatically before dependency installation.
# For standalone usage, add this step BEFORE npm ci --ignore-scripts or pip install.
#
# ==============================================================================
# PREREQUISITES
# ==============================================================================
# - GitHub Actions runner (ubuntu-latest recommended)
# - curl and sha256sum utilities (pre-installed on GitHub runners)
# - Internet access to download Safe-Chain binary
# - GITHUB_PATH environment variable (available in GitHub Actions)
#
# ==============================================================================
# CONFIGURATION
# ==============================================================================
# Environment Variables Set:
# - SAFE_CHAIN_MINIMUM_PACKAGE_AGE_HOURS: 72 hours (3 days)
# - SAFE_CHAIN_MINIMUM_PACKAGE_AGE_EXCLUSIONS: Package exclusion patterns
#
# Inputs:
# - node-version: Node.js version for Safe-Chain
# - security-patch-package-exclusion: Trusted packages to exclude from
#   minimum age filtering (e.g., @scope/* to trust all packages from scope)
#
# This ensures packages have been publicly available for at least 3 days
# before installation, allowing time for community review and security
# analysis to detect potentially malicious packages.
#
# ==============================================================================
# MINIMUM PACKAGE AGE
# ==============================================================================
# Why 72 hours?
# - Most malicious packages are discovered within 24-48 hours
# - Provides sufficient time for security researchers to analyse new packages
# - Balances security with development velocity
# - Reduces risk of zero-day supply chain attacks
# - Allows automated security scanning tools to flag issues
#
# ==============================================================================
# BEST PRACTICES
# ==============================================================================
# - Run as the first step in CI/CD pipelines (after checkout)
# - Integrate with dependency review workflows
# - Monitor Safe-Chain alerts and warnings in workflow logs
# - Maintain an approved package allowlist for critical dependencies
# - Regularly review blocked packages for false positives
# - Document exceptions for urgent dependency updates
#
# ==============================================================================
# OUTPUTS
# ==============================================================================
# This action produces the following side effects:
# - Installs Safe-Chain binary to ~/.safe-chain/bin
# - Adds ~/.safe-chain/bin to PATH for subsequent steps
# - Sets SAFE_CHAIN_MINIMUM_PACKAGE_AGE_HOURS environment variable
# - Sets SAFE_CHAIN_MINIMUM_PACKAGE_AGE_EXCLUSIONS environment variable
# - Configures Safe-Chain CI integration via setup-ci command
#
# After this action runs, Safe-Chain will automatically intercept:
# - npm, npx, yarn, pnpm, bun package installations
# - pip, pip3, uv, poetry, pipx package installations
#
# ==============================================================================
# TOOL INFORMATION
# ==============================================================================
# Tool: Safe-Chain (AikidoSec)
# Version: 1.4.6
# Installation: Via safechain.sh script (npm run install:safechain)
# Documentation: https://github.com/AikidoSec/safe-chain
# Framework: SLSA (Supply-chain Levels for Software Artifacts)
#
# ==============================================================================
# VERSION INFORMATION
# ==============================================================================
# Action Version: 1.0.0
# Safe-Chain Version: 1.4.6
# Last Updated: 2026-04-01
#
# ==============================================================================

name: ⛓️ SLSA
description: Supply-chain Levels for Software Artifacts
author: Ministry of Justice UK

inputs:
  node-version:
    required: false
    description: "Node.js version to use. Specify the exact version number (e.g., '24.11.1'). If both `node-version` and `node-version-file` are provided, `node-version` takes precedence."
    default: ""

  node-version-file:
    required: false
    description: "File containing the version specification of the Node version to use. Examples: package.json, .nvmrc, .node-version, .tool-versions. If `node-version` and `node-version-file` are both defined the action will use version from `node-version` input."
    default: ""

  security-patch-package-exclusion:
    required: false
    description: "Exclude trusted packages from minimum age filtering. Use comma-separated list for multiple packages (e.g., '@ministryofjustice/package1,@ministryofjustice/package2')"
    default: ""

runs:
  using: composite
  steps:
    - name: Node
      uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
      with:
        node-version: ${{ inputs.node-version }}
        node-version-file: ${{ inputs.node-version-file }}

    - name: ⚙️ Configuration
      working-directory: ${{ github.workspace }}
      shell: bash
      run: |
        echo "SAFE_CHAIN_MINIMUM_PACKAGE_AGE_HOURS=72" >> "$GITHUB_ENV"
        echo "SAFE_CHAIN_MINIMUM_PACKAGE_AGE_EXCLUSIONS=${{ inputs.security-patch-package-exclusion }}" >> "$GITHUB_ENV"

    - name: 📥 Install
      working-directory: ${{ github.action_path }}
      shell: bash
      run: npm run install:safechain