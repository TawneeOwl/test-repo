name: SCA test
run-name: Hello Kyle

on:
  push:

jobs:
  sca:
    runs-on: ubuntu-latest

    steps:
      - name: 📦 Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: 🐷 TruffleHog
        uses: ./.github/actions/trufflehog   # ← path to your action
        with:
          trufflehog-config-file: trufflehog-config-file.txt
          trufflehog-output-filename: sca-trufflehog

runs:
  using: composite
  steps:
    - name: 📦 Repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: 🐷 TruffleHog
      uses: ./.github/actions/trufflehog
      with:
        trufflehog-config-file: ${{ inputs.trufflehog-config-file }}
        trufflehog-output-filename: ${{ inputs.trufflehog-output-filename }}